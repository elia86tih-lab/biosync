<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BioSync — UI Concept</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#2A2520;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;padding:20px}

/* phone frame */
.phone{width:390px;height:844px;background:#FAF7F2;border-radius:44px;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.06) inset,0 0 0 8px #3A3530;
  display:flex;flex-direction:column}

/* grain overlay */
.phone::after{content:'';position:absolute;inset:0;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:256px;pointer-events:none;z-index:200}

/* status bar */
.status-bar{display:flex;justify-content:space-between;padding:14px 28px 8px;font-size:.7rem;font-weight:600;color:#8A8580;letter-spacing:.02em;position:relative;z-index:10}
.status-bar .time{font-weight:700;color:#5A5550}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons span{font-size:.6rem}

/* content scroll */
.content{flex:1;overflow-y:auto;padding:0 24px 100px;scrollbar-width:none;position:relative;z-index:10}
.content::-webkit-scrollbar{display:none}

/* greeting */
.greeting{padding-top:8px;margin-bottom:6px}
.greeting .sub{font-size:.75rem;color:#B0AAA5;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.greeting h1{font-size:1.65rem;font-weight:700;color:#2C2825;letter-spacing:-.03em}
.greeting h1 span{font-weight:400;color:#8A8580}

/* wave visualization */
.wave-vis{height:180px;margin:12px 0 18px;position:relative;border-radius:24px;overflow:hidden;
  background:linear-gradient(135deg,#FAF2EC,#F5EBE4);border:1px solid rgba(232,130,107,.12)}
.wave-vis svg{width:100%;height:100%;display:block}
.wave-label{position:absolute;bottom:14px;left:20px;display:flex;gap:12px;align-items:center}
.wave-label .dot{width:10px;height:10px;border-radius:50%;display:block}
.wave-label .txt{font-size:.72rem;font-weight:600;color:#5A5550;letter-spacing:.02em}

/* sonya card */
.sonya-card{background:linear-gradient(135deg,#FFFBF5,#FEF7EE);border-radius:22px;padding:18px 20px;margin-bottom:14px;
  border:1px solid rgba(212,145,74,.15);box-shadow:0 2px 12px rgba(212,145,74,.06);position:relative;overflow:hidden}
.sonya-card::before{content:'';position:absolute;top:-40px;right:-30px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,145,74,.08) 0%,transparent 70%);pointer-events:none}
.sonya-head{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.sonya-glow{width:44px;height:44px;border-radius:50%;position:relative;flex-shrink:0;
  background:conic-gradient(from 0deg,#E8826B,#D4914A,#4A6FA5,#E8826B);
  animation:pulseGlow 3s ease-in-out infinite;box-shadow:0 0 20px rgba(212,145,74,.2)}
.sonya-glow .inner{position:absolute;inset:5px;border-radius:50%;background:#FFFBF5;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;animation:pulseInner 3s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(212,145,74,.2)}50%{transform:scale(1.04);box-shadow:0 0 30px rgba(212,145,74,.3)}}
@keyframes pulseInner{0%,100%{opacity:.7}50%{opacity:1}}
.sonya-head .s-name{font-size:.8rem;font-weight:700;color:#D4914A;letter-spacing:.02em}
.sonya-head .s-name span{font-weight:400;color:#B0AAA5;font-size:.7rem}
.sonya-card p{font-size:.88rem;color:#5A5550;line-height:1.6;font-family:'Lora',serif;font-style:italic}
.sonya-card .action{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:.78rem;font-weight:600;color:#D4914A;cursor:pointer;transition:gap .25s ease}
.sonya-card .action:hover{gap:10px}

/* stat cards row */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.stat-card{background:#FFFFFF;border-radius:18px;padding:16px;box-shadow:0 1px 4px rgba(44,40,37,.04);border:1px solid #F0EAE4;transition:transform .25s ease,box-shadow .25s ease}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(44,40,37,.06)}
.stat-card .stat-icon{font-size:1.3rem;margin-bottom:6px;display:block}
.stat-card .stat-label{font-size:.68rem;color:#B0AAA5;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.stat-card .stat-value{font-size:1.15rem;font-weight:700;color:#2C2825}
.stat-card .stat-sub{font-size:.72rem;color:#8A8580;margin-top:2px;font-weight:500}
.stat-cor .stat-value{color:#E8826B}
.stat-ind .stat-value{color:#4A6FA5}

/* CTA */
.cta{background:#4A6FA5;color:#fff;border:none;border-radius:20px;padding:16px 24px;width:100%;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(74,111,165,.25);transition:transform .25s ease,box-shadow .25s ease;
  display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:-.01em;margin-bottom:22px}
.cta:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(74,111,165,.3)}
.cta:active{transform:translateY(0)}
.cta .arrow{font-size:1.1rem;transition:transform .25s ease}
.cta:hover .arrow{transform:translateX(3px)}

/* bottom nav */
.bottom-nav{position:absolute;bottom:12px;left:16px;right:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-radius:28px;padding:8px 10px;display:flex;justify-content:space-around;
  border:1px solid rgba(240,234,228,.8);box-shadow:0 4px 20px rgba(44,40,37,.06);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border-radius:16px;
  cursor:pointer;transition:all .25s ease;background:transparent;border:none;font-family:'Plus Jakarta Sans',sans-serif}
.nav-item .nav-icon{width:22px;height:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .25s ease}
.nav-item .nav-label{font-size:.62rem;font-weight:600;color:#B0AAA5;transition:color .25s ease;letter-spacing:.01em}
.nav-item.act .nav-icon{background:#4A6FA5;color:#fff;box-shadow:0 2px 8px rgba(74,111,165,.2)}
.nav-item.act .nav-label{color:#4A6FA5}
.nav-item:not(.act):hover .nav-icon{background:rgba(74,111,165,.08)}

/* utility */
.mt-1{margin-top:10px}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons"><span>📶</span><span>📶</span><span>🔋</span></div>
  </div>
  <div class="content">

    <!-- greeting -->
    <div class="greeting">
      <div class="sub">Mon 17 Mar 2026</div>
      <h1>Good morning, <span>Alex</span></h1>
    </div>

    <!-- wave visualization -->
    <div class="wave-vis">
      <svg viewBox="0 0 342 180" preserveAspectRatio="none">
        <defs>
          <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#E8826B" stop-opacity=".35"/>
            <stop offset="40%" stop-color="#E8826B" stop-opacity=".15"/>
            <stop offset="60%" stop-color="#D4914A" stop-opacity=".15"/>
            <stop offset="100%" stop-color="#4A6FA5" stop-opacity=".2"/>
          </linearGradient>
          <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#E8826B" stop-opacity=".2"/>
            <stop offset="100%" stop-color="#4A6FA5" stop-opacity=".08"/>
          </linearGradient>
        </defs>
        <path d="M0 140 Q40 80 85 100 Q130 120 170 70 Q210 20 255 60 Q300 100 342 50 L342 180 L0 180Z" fill="url(#waveGrad)">
          <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
            M0 140 Q40 80 85 100 Q130 120 170 70 Q210 20 255 60 Q300 100 342 50 L342 180 L0 180Z;
            M0 130 Q40 100 85 80 Q130 60 170 90 Q210 120 255 50 Q300 80 342 70 L342 180 L0 180Z;
            M0 140 Q40 80 85 100 Q130 120 170 70 Q210 20 255 60 Q300 100 342 50 L342 180 L0 180Z"/>
        </path>
        <path d="M0 160 Q60 115 120 130 Q170 145 220 100 Q270 55 342 90 L342 180 L0 180Z" fill="url(#waveGrad2)">
          <animate attributeName="d" dur="7s" repeatCount="indefinite" values="
            M0 160 Q60 115 120 130 Q170 145 220 100 Q270 55 342 90 L342 180 L0 180Z;
            M0 150 Q60 130 120 115 Q170 100 220 125 Q270 85 342 100 L342 180 L0 180Z;
            M0 160 Q60 115 120 130 Q170 145 220 100 Q270 55 342 90 L342 180 L0 180Z"/>
        </path>
        <!-- dots -->
        <circle cx="85" cy="92" r="3" fill="#E8826B" opacity=".5">
          <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values=".5;.8;.5"/>
        </circle>
        <circle cx="170" cy="62" r="3.5" fill="#D4914A" opacity=".5">
          <animate attributeName="opacity" dur="2.3s" repeatCount="indefinite" values=".5;.9;.5"/>
        </circle>
        <circle cx="255" cy="52" r="3" fill="#4A6FA5" opacity=".4">
          <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values=".4;.8;.4"/>
        </circle>
      </svg>
      <div class="wave-label">
        <span class="dot" style="background:#E8826B"></span>
        <span class="txt">Luteal phase · day 22</span>
      </div>
    </div>

    <!-- Sonya card -->
    <div class="sonya-card">
      <div class="sonya-head">
        <div class="sonya-glow">
          <div class="inner">✦</div>
        </div>
        <div><div class="s-name">Sonya <span>AI Mediator</span></div></div>
      </div>
      <p>Today is a day of restoration. I have 3 small suggestions for you.</p>
      <div class="action">See suggestions →</div>
    </div>

    <!-- stat cards -->
    <div class="stats-row">
      <div class="stat-card stat-cor">
        <span class="stat-icon">🌸</span>
        <div class="stat-label">Phase</div>
        <div class="stat-value">Restoration</div>
        <div class="stat-sub">Luteal · day 22 of 28</div>
      </div>
      <div class="stat-card stat-ind">
        <span class="stat-icon">📈</span>
        <div class="stat-label">Energy</div>
        <div class="stat-value">Rising</div>
        <div class="stat-sub">+2 from yesterday</div>
      </div>
    </div>

    <!-- CTA -->
    <button class="cta">
      Check in with your partner
      <span class="arrow">→</span>
    </button>

  </div>

  <!-- bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item act">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">✦</span>
      <span class="nav-label">Sonya</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">💞</span>
      <span class="nav-label">Rituals</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </button>
  </div>
</div>
</body>
</html>
